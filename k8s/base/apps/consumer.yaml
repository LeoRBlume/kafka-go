apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: apps
spec:
  replicas: 50
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: consumer
          image: consumer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: KAFKA_BROKER
              value: "kafka.kafka.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "demo-topic"
            - name: KAFKA_GROUP_ID
              value: "demo-consumer-group"
            - name: SERVER_PORT
              value: "8082"
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: consumer
  namespace: apps
spec:
  type: NodePort
  selector:
    app: consumer
  ports:
    - port: 8082
      targetPort: 8082
      nodePort: 30082

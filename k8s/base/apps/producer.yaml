apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      containers:
        - name: producer
          image: producer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: KAFKA_BROKER
              value: "kafka.kafka.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "demo-topic"
            - name: SERVER_PORT
              value: "8081"
            - name: WORKER_COUNT
              value: "5000"
            - name: BATCH_SIZE
              value: "100"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: producer
  namespace: apps
spec:
  type: NodePort
  selector:
    app: producer
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
